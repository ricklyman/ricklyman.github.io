<html><head><script type="text/javascript">
function noref_request(site_url){
   var virtualForm = 'data:text/html,<form id="genform" action="' + site_url + '" method="GET"><input type="submit"></form> <script>genform.submit()<\/script>';  

   var iframe = document.createElement('iframe');
   // iframe.frameBorder=1;
   // iframe.width= window.innerWidth ;  
   // iframe.height= "350px";
   iframe.seamless='seamless';
   iframe.id="frame_"+Math.floor(Math.random()*1000);
   iframe.setAttribute("src", virtualForm); 
   iframe.setAttribute("style", "border: 0; width:" + window.innerWidth +"; height:" + window.innerHeight + ";");
   document.getElementById("response").appendChild(iframe); 
} 
function clear_response()
{
    var node = document.getElementById("response");
    while (node.hasChildNodes()) {
		node.removeChild(node.lastChild);
	}
	return;
}
</script>
</head><body>
&nbsp;&gt;
<label for="site" value="check site for &quot;No referer&quot; header">Check if a website allows an empty <em>Referer</em> header:</label>&nbsp;
<input type="text" length="20" name="site" id="site" placeholder="http(s)://domain.com">&nbsp;
<button onclick="noref_request(document.getElementById(&quot;site&quot;).value); return false;"><strong>No Referer</strong> load</button>
&lt;&nbsp;&nbsp;&gt;
<label>Extracted sites in frames:&nbsp;&nbsp;<button onclick="clear_response(); return false;"><strong>Clear all extractions</strong></button></label>
&lt;&nbsp;
<div id="response"></div>  
<style>
.low{ font-size:0.8em }
.link {
	color: blue;	
	cursor: pointer;
} .link:hover {
	text-decoration: underline;
}
</style>
</body></html>
