<html>
<head>
  <title>General Interface</title>
  <!-- Debug Overlay for Console Errors -->
  <script type="text/javascript">
    (function() {
      var logContainer = document.createElement("div");
      logContainer.style.position = "fixed";
      logContainer.style.bottom = "0";
      logContainer.style.left = "0";
      logContainer.style.width = "100%";
      logContainer.style.maxHeight = "150px";
      logContainer.style.overflowY = "auto";
      logContainer.style.backgroundColor = "rgba(17, 18, 24, 0.95)";
      logContainer.style.color = "#ff4d6d";
      logContainer.style.fontFamily = "monospace";
      logContainer.style.fontSize = "12px";
      logContainer.style.padding = "10px";
      logContainer.style.boxSizing = "border-box";
      logContainer.style.zIndex = "999999";
      logContainer.style.borderTop = "2px solid #ff4d6d";
      logContainer.id = "ide-debug-log";

      window.addEventListener("DOMContentLoaded", function() {
        document.body.appendChild(logContainer);
        
        // Print VFS keys to help debug what files are present
        try {
          var activeFs = localStorage.getItem("__ACTIVE_FILESYSTEM_ID__") || "opfs";
          var cacheKey = activeFs === "local" ? "__LOCAL_VIRTUAL_FS__" : "__OPFS_VIRTUAL_FS__";
          var raw = localStorage.getItem(cacheKey);
          if (raw) {
            var data = JSON.parse(raw);
            var fileKeys = Object.keys(data.files || {});
            var dirKeys = data.directories || [];
            console.log("[VFS-STATUS] Active Workspace: " + activeFs);
            console.log("[VFS-STATUS] Total Virtual Files: " + fileKeys.length);
            fileKeys.forEach(function(k) {
              console.log("  - File: " + k);
            });
            console.log("[VFS-STATUS] Total Virtual Folders: " + dirKeys.length);
            dirKeys.forEach(function(k) {
              console.log("  - Folder: " + k);
            });
          } else {
            console.log("[VFS-STATUS] VFS cache is empty/missing in localStorage for: " + activeFs);
          }
        } catch(e) {
          console.error("[VFS-STATUS] Error listing files: " + e.message);
        }
      });

      function addLog(msg, color) {
        var span = document.createElement("div");
        span.style.color = color || "#ff4d6d";
        span.style.marginBottom = "4px";
        span.textContent = msg;
        logContainer.appendChild(span);
        logContainer.scrollTop = logContainer.scrollHeight;
      }

      window.onerror = function(message, source, lineno, colno, error) {
        addLog("[ERROR] " + message + " (at " + source + ":" + lineno + ")", "#ff4d6d");
        return false;
      };

      // Wrap console methods
      var originalError = console.error;
      console.error = function() {
        originalError.apply(console, arguments);
        addLog("[CONSOLE.ERROR] " + Array.prototype.slice.call(arguments).join(" "), "#ff4d6d");
      };

      var originalWarn = console.warn;
      console.warn = function() {
        originalWarn.apply(console, arguments);
        addLog("[CONSOLE.WARN] " + Array.prototype.slice.call(arguments).join(" "), "#ffb703");
      };

      var originalLog = console.log;
      console.log = function() {
        originalLog.apply(console, arguments);
        addLog("[CONSOLE.LOG] " + Array.prototype.slice.call(arguments).join(" "), "#38b000");
      };
    })();
  </script>

  <!-- Global XMLHttpRequest Interceptor to serve virtual files from localStorage VFS -->
  <script type="text/javascript">
    (function() {
      var OriginalXHR = window.XMLHttpRequest;
      
      async function readOPFSFile(virtualPath) {
        if (!navigator.storage || !navigator.storage.getDirectory) return null;
        try {
          const root = await navigator.storage.getDirectory();
          const parts = virtualPath.replace(/\\/g, "/").split("/").filter(Boolean);
          if (parts.length === 0) return null;
          
          let dirHandle = root;
          for (let i = 0; i < parts.length - 1; i++) {
            let part = parts[i];
            if (part.endsWith(":")) part = part.slice(0, -1);
            dirHandle = await dirHandle.getDirectoryHandle(part);
          }
          const fileName = parts[parts.length - 1];
          const fileHandle = await dirHandle.getFileHandle(fileName);
          const file = await fileHandle.getFile();
          return await file.text();
        } catch (err) {
          console.warn("[XHR-INTERCEPT] readOPFSFile error for " + virtualPath + ":", err);
          return null;
        }
      }

      async function readLocalFile(virtualPath) {
        try {
          const handle = await new Promise(function(resolve, reject) {
            var request = indexedDB.open("LocalDiskVFS_DB", 1);
            request.onsuccess = function(e) {
              var db = e.target.result;
              try {
                var tx = db.transaction("handles", "readonly");
                var store = tx.objectStore("handles");
                var req = store.get("project_root");
                req.onsuccess = function(ev) { resolve(ev.target.result); };
                req.onerror = function() { reject(); };
              } catch(ex) { reject(); }
            };
            request.onerror = function() { reject(); };
          });
          if (!handle) return null;
          
          var relativePath = virtualPath;
          if (virtualPath.toLowerCase().indexOf("c:\\projects\\tibcogi") === 0) {
            relativePath = virtualPath.substring(19);
          }
          var parts = relativePath.split("\\").filter(Boolean);
          if (parts.length === 0) return null;
          
          let dirHandle = handle;
          for (let i = 0; i < parts.length - 1; i++) {
            dirHandle = await dirHandle.getDirectoryHandle(parts[i]);
          }
          const fileName = parts[parts.length - 1];
          const fileHandle = await dirHandle.getFileHandle(fileName);
          const file = await fileHandle.getFile();
          return await file.text();
        } catch (err) {
          console.warn("[XHR-INTERCEPT] readLocalFile error for " + virtualPath + ":", err);
          return null;
        }
      }

      function MockXHR() {
        var xhr = new OriginalXHR();
        var isIntercepted = false;
        var interceptedUrl = "";
        var responseText = "";
        var status = 0;
        var readyState = 0;
        var isAsync = true;
        var cachedXML = null;
        var self = this;
        
        this.onreadystatechange = null;
        this.onload = null;
        this.onerror = null;
        this.onloadend = null;
        
        this.open = function(method, url, async, user, password) {
          isAsync = (async !== false);
          if (url && url.indexOf("file:") === 0) {
            isIntercepted = true;
            interceptedUrl = url;
            status = 0;
            readyState = 1;
            cachedXML = null;
            console.log("[XHR-INTERCEPT] Intercepting open for: " + url + " (async: " + isAsync + ")");
            if (self.onreadystatechange) self.onreadystatechange();
          } else {
            xhr.open(method, url, async, user, password);
          }
        };
        
        this.send = function(data) {
          if (isIntercepted) {
            var path = decodeURIComponent(interceptedUrl);
            if (path.indexOf("file://") === 0) {
              path = path.substring(7);
            } else if (path.indexOf("file:/") === 0) {
              path = path.substring(6);
            }
            if (path.startsWith("/")) path = path.substring(1);
            
            // Normalize path separators to Windows backslashes and collapse duplicate backslashes
            path = path.replace(/\//g, "\\").replace(/\\+/g, "\\");
            
            // Load Virtual File System based on the active provider
            var vfsFiles = {};
            var activeFs = "opfs";
            try {
              activeFs = localStorage.getItem("__ACTIVE_FILESYSTEM_ID__") || "opfs";
              var runnerCacheRaw = localStorage.getItem("__RUNNER_VFS_CACHE__");
              console.log("[XHR-INTERCEPT] Active FS: " + activeFs + ", Cache raw len: " + (runnerCacheRaw ? runnerCacheRaw.length : "null"));
              if (runnerCacheRaw) {
                vfsFiles = JSON.parse(runnerCacheRaw) || {};
                var keys = Object.keys(vfsFiles);
                console.log("[XHR-INTERCEPT] Loaded " + keys.length + " files from RUNNER_VFS_CACHE. Keys: " + JSON.stringify(keys));
              } else {
                var cacheKey = activeFs === "local" ? "__LOCAL_VIRTUAL_FS__" : "__OPFS_VIRTUAL_FS__";
                var raw = localStorage.getItem(cacheKey);
                if (raw) {
                  vfsFiles = JSON.parse(raw).files || {};
                  console.log("[XHR-INTERCEPT] Loaded " + Object.keys(vfsFiles).length + " files from localStorage " + cacheKey);
                }
              }
            } catch (e) {
              console.warn("[XHR-INTERCEPT] Failed to parse localStorage VFS:", e);
            }
            
            var globalVFS = window.__VFS_FILES__ || {};
            var globalFiles = globalVFS[activeFs] || {};
            
            var fireResponse = function(text, statusCode) {
              responseText = text;
              status = statusCode;
              readyState = 4;
              if (isAsync) {
                setTimeout(fireEvents, 0);
              } else {
                fireEvents();
              }
            };
            
            var fireEvents = function() {
              if (self.onreadystatechange) self.onreadystatechange();
              if (status === 200) {
                if (self.onload) self.onload();
              } else {
                if (self.onerror) self.onerror();
              }
              if (self.onloadend) self.onloadend();
            };
            
            var openerVFS = {};
            try {
              if (window.opener && window.opener.__VFS_FILES__) {
                openerVFS = window.opener.__VFS_FILES__;
              }
            } catch (e) {
              console.warn("[XHR-INTERCEPT] Failed to access window.opener.__VFS_FILES__:", e);
            }
            var openerFiles = openerVFS[activeFs] || {};
            
            var pathLower = path.toLowerCase();
            var matchedVfsKey = Object.keys(vfsFiles).find(function(k) { return k.toLowerCase() === pathLower; });
            var matchedGlobalKey = Object.keys(globalFiles).find(function(k) { return k.toLowerCase() === pathLower; });
            var matchedOpenerKey = Object.keys(openerFiles).find(function(k) { return k.toLowerCase() === pathLower; });
            
            if (matchedVfsKey) {
              console.log("[XHR-INTERCEPT] Read Success (localStorage cache): " + path);
              fireResponse(vfsFiles[matchedVfsKey], 200);
            } else if (matchedGlobalKey) {
              console.log("[XHR-INTERCEPT] Read Success (in-memory VFS): " + path);
              fireResponse(globalFiles[matchedGlobalKey], 200);
            } else if (matchedOpenerKey) {
              console.log("[XHR-INTERCEPT] Read Success (opener VFS): " + path);
              fireResponse(openerFiles[matchedOpenerKey], 200);
            } else if (isAsync) {
              console.log("[XHR-INTERCEPT] File not in memory yet, attempting async physical read: " + path);
              var readPromise = activeFs === "local" ? readLocalFile(path) : readOPFSFile(path);
              readPromise.then(function(content) {
                if (content !== null) {
                  console.log("[XHR-INTERCEPT] Async Physical Read Success: " + path);
                  globalFiles[path] = content;
                  fireResponse(content, 200);
                } else {
                  console.warn("[XHR-INTERCEPT] 404 Not Found (Physical Read Failed): " + path);
                  fireResponse("", 404);
                }
              }).catch(function() {
                fireResponse("", 404);
              });
            } else {
              console.warn("[XHR-INTERCEPT] 404 Not Found (Sync request fallback): " + path);
              fireResponse("", 404);
            }
          } else {
            xhr.send(data);
          }
        };
        
        Object.defineProperty(this, 'status', {
          get: function() { return isIntercepted ? status : xhr.status; }
        });
        
        Object.defineProperty(this, 'readyState', {
          get: function() { return isIntercepted ? readyState : xhr.readyState; }
        });
        
        Object.defineProperty(this, 'responseText', {
          get: function() { return isIntercepted ? responseText : xhr.responseText; }
        });
        
        Object.defineProperty(this, 'responseXML', {
          get: function() {
            if (isIntercepted) {
              if (!cachedXML && responseText) {
                var parser = new DOMParser();
                cachedXML = parser.parseFromString(responseText, "text/xml");
              }
              return cachedXML;
            }
            return xhr.responseXML;
          }
        });
        
        this.abort = function() { if (!isIntercepted) xhr.abort(); };
        this.setRequestHeader = function(header, value) { if (!isIntercepted) xhr.setRequestHeader(header, value); };
        
        this.getAllResponseHeaders = function() {
          return isIntercepted ? "Content-Type: text/xml" : xhr.getAllResponseHeaders();
        };
        
        this.getResponseHeader = function(header) {
          if (isIntercepted) {
            if (header.toLowerCase() === "content-type") return "text/xml";
            return null;
          }
          return xhr.getResponseHeader(header);
        };
        
        xhr.onreadystatechange = function() {
          if (!isIntercepted) {
            self.status = xhr.status;
            self.readyState = xhr.readyState;
            self.responseText = xhr.responseText;
            self.responseXML = xhr.responseXML;
            if (self.onreadystatechange) self.onreadystatechange();
          }
        };
      }
      
      window.XMLHttpRequest = MockXHR;
      console.log("[XHR-INTERCEPT] Global XHR interceptor successfully registered in shell.html.");
    })();
  </script>
</head>

<body bgcolor="#9898a5" scroll="no" 
    style="position:absolute;width:100%;height:100%;left:0px;top:0px;padding:0px;margin:0px;border:0px;overflow:hidden;">

<div id="jsxmain" style="position:absolute;left:0px;top:0px;width:100%;height:100%;">
  <script type="text/javascript">
    // Secure appPath extraction using clean local variable and regex match
    var url = window.location.href;
    var match = url.match(/[?&]jsxapppath=([^&]+)/);
    var appPath = match ? match[1] : "";
    // If appPath ends with a trailing slash, strip it because the GI engine appends its own slashes
    if (appPath && appPath.endsWith("/")) {
      appPath = appPath.substring(0, appPath.length - 1);
    }
    document.write('<script type="text/javascript" src="JSX/js/JSX30.js" jsxapppath="' +
        appPath + '"><'+'/script>');
  </script>
  
  <!-- Load OPFS or Local driver based on active workspace selection -->
  <script type="text/javascript">
    var activeFs = localStorage.getItem("__ACTIVE_FILESYSTEM_ID__") || "opfs";
    var driverPath = activeFs === "local" 
        ? "GI_Builder/plugins/jsx3.io.local/File.js" 
        : "GI_Builder/plugins/jsx3.io.opfs/File_v9.js";
    document.write('<script type="text/javascript" src="' + driverPath + '"><'+'/script>');
  </script>
</div>
