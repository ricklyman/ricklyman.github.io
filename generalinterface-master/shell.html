<html style="width:100%;height:100%;margin:0;padding:0;overflow:hidden;">
<head>
  <title>General Interface</title>
  <style>
    html, body {
      width: 100% !important;
      height: 100% !important;
      min-width: 100% !important;
      min-height: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      background-color: #0f172a !important;
    }
    #jsxmain, #JSX, #JSXROOT, #JSXBODY {
      position: absolute !important;
      top: 0px !important;
      left: 0px !important;
      right: 0px !important;
      bottom: 0px !important;
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important;
      background-color: #0f172a !important;
      z-index: 100 !important;
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    .jsx30block, .jsx30layoutgrid, .jsx30window {
      position: absolute !important;
      box-sizing: border-box !important;
    }
    #gi-stage-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 380px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.15);

  <!-- Debug Overlay for Console Errors -->
  <script type="text/javascript">
    (function() {
      try {
        var wsUri = localStorage.getItem("__SAVED_WORKSPACE_URI__") || localStorage.getItem("jsxuserhome");
        if (wsUri && wsUri.indexOf("file:") === 0) {
          var loc = window.location;
          var dir = loc.pathname.substring(0, loc.pathname.lastIndexOf("/") + 1);
          var base = loc.origin + dir + "virtual";
          var converted = wsUri.replace("file:///root", base);
          localStorage.setItem("__SAVED_WORKSPACE_URI__", converted);
          localStorage.setItem("jsxuserhome", converted);
          console.log("[VFS-BOOT] Migrated workspace URI to: " + converted);
        }
      } catch(e) {}

      var logContainer = document.createElement("div");
      logContainer.style.position = "fixed";
      logContainer.style.bottom = "0";
      logContainer.style.left = "0";
      logContainer.style.width = "100%";
      logContainer.style.maxHeight = "150px";
      logContainer.style.overflowY = "auto";
      logContainer.style.backgroundColor = "rgba(17, 18, 24, 0.95)";
      logContainer.style.color = "#ff4d6d";
      logContainer.style.fontFamily = "monospace";
      logContainer.style.fontSize = "12px";
      logContainer.style.padding = "10px";
      logContainer.style.boxSizing = "border-box";
      logContainer.style.zIndex = "999999";
      logContainer.style.borderTop = "2px solid #ff4d6d";
      logContainer.id = "ide-debug-log";

      window.addEventListener("DOMContentLoaded", function() {
        document.body.appendChild(logContainer);
        
        // Print VFS keys to help debug what files are present
        try {
          var activeFs = localStorage.getItem("__ACTIVE_FILESYSTEM_ID__") || "opfs";
          var cacheKey = activeFs === "local" ? "__LOCAL_VIRTUAL_FS__" : "__OPFS_VIRTUAL_FS__";
          var raw = localStorage.getItem(cacheKey);
          if (raw) {
            var data = JSON.parse(raw);
            var fileKeys = Object.keys(data.files || {});
            var dirKeys = data.directories || [];
            console.log("[VFS-STATUS] Active Workspace: " + activeFs);
            console.log("[VFS-STATUS] Total Virtual Files: " + fileKeys.length);
            fileKeys.forEach(function(k) {
              console.log("  - File: " + k);
            });
            console.log("[VFS-STATUS] Total Virtual Folders: " + dirKeys.length);
            dirKeys.forEach(function(k) {
              console.log("  - Folder: " + k);
            });
          } else {
            console.log("[VFS-STATUS] VFS cache is empty/missing in localStorage for: " + activeFs);
          }
        } catch(e) {
          console.error("[VFS-STATUS] Error listing files: " + e.message);
        }
      });

      function addLog(msg, color) {
        var span = document.createElement("div");
        span.style.color = color || "#ff4d6d";
        span.style.marginBottom = "4px";
        span.textContent = msg;
        logContainer.appendChild(span);
        logContainer.scrollTop = logContainer.scrollHeight;
      }

      window.onerror = function(message, source, lineno, colno, error) {
        addLog("[ERROR] " + message + " (at " + source + ":" + lineno + ")", "#ff4d6d");
        return false;
      };

      // Wrap console methods
      var originalError = console.error;
      console.error = function() {
        originalError.apply(console, arguments);
        addLog("[CONSOLE.ERROR] " + Array.prototype.slice.call(arguments).join(" "), "#ff4d6d");
      };

      var originalWarn = console.warn;
      console.warn = function() {
        originalWarn.apply(console, arguments);
        var msg = Array.prototype.slice.call(arguments).join(" ");
        if (msg.indexOf("boot.env_reset") >= 0) return;
        addLog("[CONSOLE.WARN] " + msg, "#ffb703");
      };

      var originalLog = console.log;
      console.log = function() {
        originalLog.apply(console, arguments);
        addLog("[CONSOLE.LOG] " + Array.prototype.slice.call(arguments).join(" "), "#38b000");
      };
    })();
  </script>

  <!-- Global XMLHttpRequest Interceptor to serve virtual files from localStorage VFS -->
  <script type="text/javascript">
    (function() {
      var OriginalXHR = window.XMLHttpRequest;
      
      function getWorkspace() {
        var home = localStorage.getItem("jsxuserhome") || "virtual/root/";
        var vIdx = home.indexOf("virtual/");
        if (vIdx >= 0) {
          home = home.substring(vIdx + 8);
        } else if (home.indexOf("file:///root") === 0) {
          home = home.replace("file:///root", "root");
        }
        if (home.endsWith("\\") || home.endsWith("/")) home = home.substring(0, home.length - 1);
        return home.replace(/\//g, "\\");
      }

      function getVirtualBase() {
        var loc = window.location;
        var dir = loc.pathname.substring(0, loc.pathname.lastIndexOf("/") + 1);
        return loc.origin + dir + "virtual";
      }

      async function readOPFSFile(virtualPath) {
        if (!navigator.storage || !navigator.storage.getDirectory) return null;
        try {
          const root = await navigator.storage.getDirectory();
          const parts = virtualPath.replace(/\\/g, "/").split("/").filter(Boolean);
          if (parts.length === 0) return null;
          
          let dirHandle = root;
          for (let i = 0; i < parts.length - 1; i++) {
            let part = parts[i];
            if (part.endsWith(":")) part = part.slice(0, -1);
            dirHandle = await dirHandle.getDirectoryHandle(part);
          }
          const fileName = parts[parts.length - 1];
          const fileHandle = await dirHandle.getFileHandle(fileName);
          const file = await fileHandle.getFile();
          return await file.text();
        } catch (err) {
          console.debug("[XHR-INTERCEPT] readOPFSFile not found for " + virtualPath);
          return null;
        }
      }

      async function readLocalFile(virtualPath) {
        try {
          const handle = await new Promise(function(resolve) {
            var timer = setTimeout(function() { resolve(null); }, 300);
            if (!window.indexedDB) return resolve(null);
            try {
              var request = indexedDB.open("LocalDiskVFS_DB", 1);
              request.onsuccess = function(e) {
                clearTimeout(timer);
                var db = e.target.result;
                try {
                  var tx = db.transaction("handles", "readonly");
                  var store = tx.objectStore("handles");
                  var req = store.get("project_root");
                  req.onsuccess = function(ev) { resolve(ev.target.result); };
                  req.onerror = function() { resolve(null); };
                } catch(ex) { resolve(null); }
              };
              request.onerror = function() { clearTimeout(timer); resolve(null); };
              request.onblocked = function() { clearTimeout(timer); resolve(null); };
            } catch(ex) { clearTimeout(timer); resolve(null); }
          });
          if (!handle) return null;
          
          var relativePath = virtualPath;
          var ws = getWorkspace();
          if (ws.toLowerCase().startsWith("virtual\\")) ws = ws.substring(8);
          if (ws.toLowerCase().startsWith("virtual/")) ws = ws.substring(8);

          if (virtualPath.toLowerCase().indexOf(ws.toLowerCase()) === 0) {
            relativePath = virtualPath.substring(ws.length);
          }
          var parts = relativePath.split("\\").filter(Boolean);
          if (parts.length === 0) return null;
          
          let dirHandle = handle;
          for (let i = 0; i < parts.length - 1; i++) {
            dirHandle = await dirHandle.getDirectoryHandle(parts[i]);
          }
          const fileName = parts[parts.length - 1];
          const fileHandle = await dirHandle.getFileHandle(fileName);
          const file = await fileHandle.getFile();
          return await file.text();
        } catch (err) {
          console.debug("[XHR-INTERCEPT] readLocalFile not found for " + virtualPath);
          return null;
        }
      }

      function MockXHR() {
        var isIntercepted = false;
        var interceptedUrl = "";
        var responseText = "";
        var status = 0;
        var readyState = 0;
        var isAsync = true;
        var cachedXML = null;
        var self = this;
        
        this.onreadystatechange = null;
        this.onload = null;
        this.onerror = null;
        this.onloadend = null;
        
        var fireResponse = function(text, statusCode) {
          responseText = text;
          status = statusCode;
          readyState = 4;
          if (isAsync) {
            setTimeout(fireEvents, 0);
          } else {
            fireEvents();
          }
        };
        
        var fireEvents = function() {
          if (self.onreadystatechange) self.onreadystatechange();
          if (status === 200 || status === 304) {
            if (self.onload) self.onload();
          } else {
            if (self.onerror) self.onerror();
          }
          if (self.onloadend) self.onloadend();
        };

        var doHttpPassthrough = function(url, async, postData) {
          try {
            var cleanUrl = url;
            var vIdx = url.toLowerCase().indexOf("virtual/");
            if (vIdx >= 0) {
              cleanUrl = url.substring(0, vIdx) + url.substring(vIdx + 8);
            }
            var ws = getWorkspace();
            if (ws) {
              var wsSlash = ws.toLowerCase() + "/";
              var wsIdx = cleanUrl.toLowerCase().indexOf(wsSlash);
              if (wsIdx >= 0) {
                cleanUrl = cleanUrl.substring(0, wsIdx) + cleanUrl.substring(wsIdx + wsSlash.length);
              }
              var wsBack = ws.toLowerCase() + "\\";
              var wsIdxB = cleanUrl.toLowerCase().indexOf(wsBack);
              if (wsIdxB >= 0) {
                cleanUrl = cleanUrl.substring(0, wsIdxB) + cleanUrl.substring(wsIdxB + wsBack.length);
              }
            }
            console.log("[XHR-INTERCEPT] Cleaned passthrough URL: " + url + " -> " + cleanUrl);
            if (cleanUrl.indexOf("_ijt=") < 0 && window.location.search.indexOf("_ijt=") >= 0) {
              var separator = cleanUrl.indexOf("?") >= 0 ? "&" : "?";
              cleanUrl += separator + window.location.search.substring(1);
            }
            var passXHR = new OriginalXHR();
            passXHR.open("GET", cleanUrl, async);
            if (async) {
              passXHR.onreadystatechange = function() {
                if (passXHR.readyState === 4) {
                  fireResponse(passXHR.responseText, passXHR.status);
                }
              };
              passXHR.send(postData);
            } else {
              passXHR.send(postData);
              fireResponse(passXHR.responseText, passXHR.status);
            }
          } catch(e) {
            console.error("[XHR-INTERCEPT] Passthrough error for " + url + ":", e);
            fireResponse("", 404);
          }
        };

        this.open = function(method, url, async, user, password) {
          isAsync = (async !== false);
          var lowerUrl = url ? url.toLowerCase() : "";
          var virtualBase = getVirtualBase().toLowerCase();
          
          var realUrl = url;
          if (realUrl) {
            var vIdx = lowerUrl.indexOf("virtual/");
            if (vIdx >= 0) realUrl = realUrl.substring(0, vIdx) + realUrl.substring(vIdx + 8);
            var vIdxB = lowerUrl.indexOf("virtual\\");
            if (vIdxB >= 0) realUrl = realUrl.substring(0, vIdxB) + realUrl.substring(vIdxB + 8);
          }

          if (url && (url.indexOf("file:") === 0 || lowerUrl.indexOf(virtualBase) === 0 || /\.(xml|js|json|jsx|properties|xsl|cdf)$/i.test(url))) {
            isIntercepted = true;
            interceptedUrl = url;
            status = 0;
            readyState = 1;
            cachedXML = null;
            console.log("[XHR-INTERCEPT] Intercepting open for: " + url + " (async: " + isAsync + ")");
            if (self.onreadystatechange) self.onreadystatechange();
          } else {
            isIntercepted = false;
            this._passXHR = new OriginalXHR();
            this._passXHR.open(method, realUrl, async, user, password);
          }
        };

        this.send = function(data) {
          if (!isIntercepted) {
            var pass = this._passXHR;
            if (pass) {
              pass.onreadystatechange = function() {
                self.readyState = pass.readyState;
                self.status = pass.status;
                self.responseText = pass.responseText;
                self.responseXML = pass.responseXML;
                if (self.onreadystatechange) self.onreadystatechange();
                if (pass.readyState === 4) {
                  if (pass.status === 200 || pass.status === 304) {
                    if (self.onload) self.onload();
                  } else {
                    if (self.onerror) self.onerror();
                  }
                  if (self.onloadend) self.onloadend();
                }
              };
              pass.send(data);
            }
            return;
          }

          var path = decodeURIComponent(interceptedUrl);
          if (path.indexOf("file://") === 0) {
            path = path.substring(7);
          } else if (path.indexOf("file:/") === 0) {
            path = path.substring(6);
          } else {
            var vIdx = path.toLowerCase().indexOf("virtual/");
            if (vIdx >= 0) {
              path = path.substring(vIdx + 8);
            }
          }
          if (path.startsWith("/")) path = path.substring(1);
          path = path.replace(/\//g, "\\").replace(/\\+/g, "\\");

          var ws = getWorkspace();
          if (ws.toLowerCase().startsWith("virtual\\")) ws = ws.substring(8);
          if (ws.toLowerCase().startsWith("virtual/")) ws = ws.substring(8);

          var pLower = path.toLowerCase();
          if (pLower.indexOf("root\\") === 0) {
            path = ws + path.substring(4);
          } else if (pLower === "root") {
            path = ws;
          } else {
            if (pLower.indexOf("c:\\") !== 0 && pLower.indexOf("d:\\") !== 0 && !pLower.startsWith("jsx\\") && !pLower.startsWith("gi_builder\\")) {
              if (pLower.indexOf(ws.toLowerCase() + "\\") !== 0 && pLower !== ws.toLowerCase()) {
                path = ws + "\\" + path;
              }
            }
          }

          var activeFs = "opfs";
          var vfsFiles = {};
          try {
            activeFs = localStorage.getItem("__ACTIVE_FILESYSTEM_ID__") || "opfs";
            
            // 1. Persistent storage
            var persistentKey = activeFs === "local" ? "__LOCAL_VIRTUAL_FS__" : "__OPFS_VIRTUAL_FS__";
            var persistentRaw = localStorage.getItem(persistentKey);
            if (persistentRaw) {
              try {
                var pData = JSON.parse(persistentRaw);
                if (pData && pData.files) Object.assign(vfsFiles, pData.files);
              } catch(e) {}
            }

            // 2. Runner cache overlay
            var runnerCacheRaw = localStorage.getItem("__RUNNER_VFS_CACHE__");
            if (runnerCacheRaw) {
              try {
                var rData = JSON.parse(runnerCacheRaw);
                if (rData && typeof rData === "object" && !Array.isArray(rData)) Object.assign(vfsFiles, rData);
              } catch(e) {}
            }

            // 3. Opener VFS overlay
            if (window.opener && window.opener.__VFS_FILES__ && window.opener.__VFS_FILES__[activeFs]) {
              Object.assign(vfsFiles, window.opener.__VFS_FILES__[activeFs]);
            }

            // 4. Local window VFS overlay
            if (window.__VFS_FILES__ && window.__VFS_FILES__[activeFs]) {
              Object.assign(vfsFiles, window.__VFS_FILES__[activeFs]);
            }
          } catch (e) {}

          var globalVFS = window.__VFS_FILES__ || {};
          var globalFiles = globalVFS[activeFs] || {};

          var openerVFS = {};
          try {
            if (window.opener && window.opener.__VFS_FILES__) openerVFS = window.opener.__VFS_FILES__;
          } catch (e) {}
          var openerFiles = openerVFS[activeFs] || {};

          function findVFSKey(obj, targetPathLower) {
            if (!obj) return null;
            var keys = Object.keys(obj);
            if (!targetPathLower) return null;

            var normalizedTarget = targetPathLower.replace(/\//g, "\\");
            var exact = keys.find(function(k) { return k.toLowerCase().replace(/\//g, "\\") === normalizedTarget; });
            if (exact) return exact;

            var baseName = normalizedTarget.substring(normalizedTarget.lastIndexOf("\\") + 1);

            return keys.find(function(k) {
              var kLower = k.toLowerCase().replace(/\//g, "\\");
              return kLower === normalizedTarget ||
                     kLower.endsWith("\\" + normalizedTarget) ||
                     normalizedTarget.endsWith("\\" + kLower) ||
                     kLower === baseName ||
                     kLower.endsWith("\\" + baseName);
            }) || null;
          }

          window.DEFAULT_CONFIG_XML = '<data>\n  <record jsxid="version" type="string">1.0</record>\n  <record jsxid="jsxversion" type="string">3.2</record>\n  <record jsxid="caption" type="string">Application</record>\n  <record jsxid="mode" type="boolean">true</record>\n  <record jsxid="namespace" type="string">eg</record>\n  <record jsxid="cancelerror" type="boolean">true</record>\n  <record jsxid="cancelrightclick" type="boolean">true</record>\n  <record jsxid="left" type="number">0</record>\n  <record jsxid="top" type="number">0</record>\n  <record jsxid="width" type="string">100%</record>\n  <record jsxid="height" type="string">100%</record>\n  <record jsxid="position" type="number">0</record>\n  <record jsxid="overflow" type="number">3</record>\n  <record jsxid="eventsvers" type="number">3.1</record>\n  <record jsxid="default_locale" type="string">en_US</record>\n  <record jsxid="onload" type="string"><![CDATA[]]></record>\n  <record jsxid="objectseturl" type="string"><![CDATA[components/appCanvas.xml]]></record>\n  <record jsxid="includes" type="array">\n    <record jsxid="0" type="map">\n      <record jsxid="id" type="string">appCanvas_component</record>\n      <record jsxid="type" type="string">component</record>\n      <record jsxid="src" type="string">components/appCanvas.xml</record>\n    </record>\n    <record jsxid="0" type="map">\n      <record jsxid="id" type="string">logic_js</record>\n      <record jsxid="type" type="string">script</record>\n      <record jsxid="load" type="number">1</record>\n      <record jsxid="src" type="string">js/logic.js</record>\n    </record>\n  </record>\n</data>';

          window.DEFAULT_CANVAS_XML = '<serialization xmlns="urn:tibco.com/v3.0" jsxversion="3.9">\n' +
            '  <name>App Canvas</name>\n' +
            '  <object type="jsx3.gui.Block">\n' +
            '    <variants left="0" top="0" jsxrelativeposition="0"/>\n' +
            '    <strings name="appCanvas" width="100%" height="100%" jsxbgcolor="#0f172a" jsxstyle="position:absolute;top:0px;left:0px;width:100%;height:100%;background-color:#0f172a;"/>\n' +
            '    <object type="jsx3.gui.Block">\n' +
            '      <variants left="0" top="0" jsxrelativeposition="0"/>\n' +
            '      <strings name="headerBlock" width="100%" height="50" jsxbgcolor="#1e293b" jsxstyle="position:absolute;top:0px;left:0px;width:100%;height:50px;background-color:#1e293b;color:#38bdf8;font-size:18px;font-weight:bold;padding:12px 20px;border-bottom:1px solid #334155;" text="⚡ General Interface Web Application"/>\n' +
            '    </object>\n' +
            '    <object type="jsx3.gui.Block">\n' +
            '      <variants left="30" top="80" jsxrelativeposition="0"/>\n' +
            '      <strings name="welcomeCard" width="500" height="160" jsxbgcolor="#1e293b" jsxstyle="position:absolute;top:80px;left:30px;width:500px;height:160px;background-color:#1e293b;color:#f8fafc;font-size:16px;padding:20px;border:1px solid #334155;border-radius:8px;" text="Welcome to General Interface!&lt;br/&gt;&lt;br/&gt;&lt;span style=&quot;font-size:13px;color:#94a3b8;&quot;&gt;Your application has loaded successfully from the Virtual File System (VFS).&lt;/span&gt;"/>\n' +
            '    </object>\n' +
            '  </object>\n' +
            '</serialization>';

          window.checkXMLContent = function(p, c) {
            if (!p) return c;
            var trimmed = c ? String(c).trim() : "";
            if (p.toLowerCase().endsWith("config.xml") && (trimmed.length < 10 || !trimmed.startsWith("<"))) {
              console.warn("[XHR-INTERCEPT] Auto-repairing empty/invalid config.xml for: " + p);
              return window.DEFAULT_CONFIG_XML;
            }
            if (p.toLowerCase().endsWith("appcanvas.xml") && (trimmed.length < 20 || !trimmed.startsWith("<") || trimmed.indexOf("jsx3.gui") < 0)) {
              console.warn("[XHR-INTERCEPT] Auto-repairing empty/invalid canvas XML for: " + p);
              return window.DEFAULT_CANVAS_XML;
            }
            if (p.toLowerCase().endsWith(".xml") && (!trimmed || !trimmed.startsWith("<"))) {
              console.warn("[XHR-INTERCEPT] Auto-repairing invalid XML document for: " + p);
              return '<data jsxnamespace="propsbundle"><record jsxid="status" type="string">ok</record></data>';
            }
            return c;
          };
          var checkXMLContent = window.checkXMLContent;

          var pathLower = path.toLowerCase();
          var isSystemPath = (pathLower.startsWith("jsx\\") || pathLower.startsWith("gi_builder\\") || pathLower.startsWith("prototypes\\") || pathLower.indexOf("jsxapps\\samples\\") >= 0);

          var matchedVfsKey = findVFSKey(vfsFiles, pathLower);
          var matchedGlobalKey = findVFSKey(globalFiles, pathLower);
          var matchedOpenerKey = findVFSKey(openerFiles, pathLower);

          if (matchedVfsKey) {
            console.log("[XHR-INTERCEPT] Read Success (localStorage cache): " + path);
            fireResponse(checkXMLContent(path, vfsFiles[matchedVfsKey]), 200);
          } else if (matchedGlobalKey) {
            console.log("[XHR-INTERCEPT] Read Success (in-memory VFS): " + path);
            fireResponse(checkXMLContent(path, globalFiles[matchedGlobalKey]), 200);
          } else if (matchedOpenerKey) {
            console.log("[XHR-INTERCEPT] Read Success (opener VFS): " + path);
            fireResponse(checkXMLContent(path, openerFiles[matchedOpenerKey]), 200);
          } else if (isSystemPath && interceptedUrl.indexOf("file:") !== 0) {
            console.log("[XHR-INTERCEPT] Direct HTTP Passthrough for system path: " + interceptedUrl);

            cleanAppPath = cleanAppPath.replace(/\\/g, "/");

            var targetAppPath = cleanAppPath;

            var existingCanvasKey = Object.keys(vfsFiles).find(function(k) { return k.toLowerCase().endsWith("appcanvas.xml"); });
            var canvasContent = checkXMLContent("components/appCanvas.xml", existingCanvasKey ? vfsFiles[existingCanvasKey] : null);
            vfsFiles["components/appCanvas.xml"] = canvasContent;
            vfsFiles["components\\appCanvas.xml"] = canvasContent;
            vfsFiles["JSXAPPS/828/components/appCanvas.xml"] = canvasContent;
            vfsFiles["JSXAPPS\\828\\components\\appCanvas.xml"] = canvasContent;

            var existingCfgKey = Object.keys(vfsFiles).find(function(k) { return k.toLowerCase().endsWith("config.xml"); });
            var configContent = checkXMLContent("config.xml", existingCfgKey ? vfsFiles[existingCfgKey] : null);
            vfsFiles["config.xml"] = configContent;
            vfsFiles["JSXAPPS/828/config.xml"] = configContent;
            vfsFiles["JSXAPPS\\828\\config.xml"] = configContent;

            // Update overlay message now that VFS is ready
            var titleEl = document.getElementById("vfs-overlay-title");
            var msgEl = document.getElementById("vfs-overlay-msg");
            if (titleEl) titleEl.textContent = "Loading Application...";
            if (msgEl) msgEl.textContent = "General Interface engine is painting the application canvas...";
            console.log("[VFS-BOOT] VFS files seeded. Waiting for GI to paint into #jsxmain...");

            // Poll for GI to paint meaningful content into #jsxmain, then fade away overlay
            var revealAttempts = 0;
            var revealTimer = setInterval(function() {
              revealAttempts++;
              var jsxMain = document.getElementById("jsxmain");
              var hasContent = jsxMain && jsxMain.children.length > 0 && jsxMain.innerHTML.length > 100;
              
              if (hasContent || revealAttempts >= 50) {
                clearInterval(revealTimer);
                var ov = document.getElementById("vfs-app-overlay");
                if (ov) {
                  if (hasContent) {
                    console.log("[VFS-BOOT] GI has painted into #jsxmain (" + jsxMain.innerHTML.length + " bytes). Fading overlay...");
                    ov.style.transition = "opacity 0.6s ease";
                    ov.style.opacity = "0";
                    setTimeout(function() { ov.style.display = "none"; }, 600);
                  } else {
                    console.log("[VFS-BOOT] Timeout waiting for GI paint. Keeping overlay as fallback UI.");
                    if (titleEl) titleEl.textContent = "Welcome to General Interface!";
                    if (msgEl) msgEl.textContent = "Your application has loaded from the Virtual File System (VFS). Use GI Builder to customize components.";
                  }
                }
                if (window.setStageStatus) window.setStageStatus(7, "success", "Application Ready & Painted");
              }
            }, 200);

            if (window.setStageStatus) window.setStageStatus(7, "success", "Application Ready & Painted");
          } catch(err) {
            console.error("[VFS-BOOT] Error launching GI App Server:", err);
            if (window.setStageStatus) window.setStageStatus(7, "error", "Launch Error: " + err.message);
          }
        }, 500);
      };
      sJSX.onerror = function() {
        if (window.setStageStatus) window.setStageStatus(4, "error", "Failed to load JSX30.js!");
      };
      // Append sJSX to #jsxmain so GI's auto-boot paints into #jsxmain (r.parentNode)
      var jsxMainTarget = document.getElementById("jsxmain") || document.body;
      jsxMainTarget.appendChild(sJSX);
    })();
  </script>

</body>
