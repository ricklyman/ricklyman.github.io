<html>
<head>
  <title>General Interface</title>
  <!-- Debug Overlay for Console Errors -->
  <script type="text/javascript">
    (function() {
      var logContainer = document.createElement("div");
      logContainer.style.position = "fixed";
      logContainer.style.bottom = "0";
      logContainer.style.left = "0";
      logContainer.style.width = "100%";
      logContainer.style.maxHeight = "150px";
      logContainer.style.overflowY = "auto";
      logContainer.style.backgroundColor = "rgba(17, 18, 24, 0.95)";
      logContainer.style.color = "#ff4d6d";
      logContainer.style.fontFamily = "monospace";
      logContainer.style.fontSize = "12px";
      logContainer.style.padding = "10px";
      logContainer.style.boxSizing = "border-box";
      logContainer.style.zIndex = "999999";
      logContainer.style.borderTop = "2px solid #ff4d6d";
      logContainer.id = "ide-debug-log";

      window.addEventListener("DOMContentLoaded", function() {
        document.body.appendChild(logContainer);
      });

      function addLog(msg, color) {
        var span = document.createElement("div");
        span.style.color = color || "#ff4d6d";
        span.style.marginBottom = "4px";
        span.textContent = msg;
        logContainer.appendChild(span);
        logContainer.scrollTop = logContainer.scrollHeight;
      }

      window.onerror = function(message, source, lineno, colno, error) {
        addLog("[ERROR] " + message + " (at " + source + ":" + lineno + ")", "#ff4d6d");
        return false;
      };

      // Wrap console methods
      var originalError = console.error;
      console.error = function() {
        originalError.apply(console, arguments);
        addLog("[CONSOLE.ERROR] " + Array.prototype.slice.call(arguments).join(" "), "#ff4d6d");
      };

      var originalWarn = console.warn;
      console.warn = function() {
        originalWarn.apply(console, arguments);
        addLog("[CONSOLE.WARN] " + Array.prototype.slice.call(arguments).join(" "), "#ffb703");
      };
      
      // Periodic check for OPFS plugin status
      var checked = false;
      setInterval(function() {
        if (window.jsx3 && jsx3.IDE && jsx3.amp && jsx3.amp.Engine) {
          try {
            var engine = jsx3.amp.Engine.getEngine(jsx3.IDE);
            if (engine) {
              var opfsPlugin = engine.getPlugIn("jsx3.io.opfs");
              if (opfsPlugin) {
                if (opfsPlugin.isLoaded()) {
                  if (!checked) {
                    addLog("[DEBUG] OPFS Plugin loaded successfully. isAvailable(): " + opfsPlugin.isAvailable(), "#38b000");
                    checked = true;
                  }
                } else {
                  addLog("[DEBUG] OPFS Plugin is registered but not loaded.", "#ffb703");
                }
              } else {
                addLog("[DEBUG] OPFS Plugin is NOT registered in the AMP engine.", "#ff4d6d");
              }
            }
          } catch(e) {
            addLog("[DEBUG.ERROR] " + e.message, "#ff4d6d");
          }
        }
      }, 2000);
    })();
  </script>
</head>

<body BGCOLOR="#9898a5" SCROLL="no" style="position:absolute;width:100%;height:100%;left:0px;top:0px;padding:0px;margin:0px;border:0px;overflow:hidden;">

<div id="jsxmain" style="position:absolute;left:0px;top:0px;width:100%;height:100%;">
  <script type="text/javascript" src="JSX/js/JSX30.js"
      jsxapppath="GI_Builder/"
      jsxmanualhome="true"
    >
  </script>
</div>

</body>
</html>
