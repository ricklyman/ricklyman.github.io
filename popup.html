<!-- Trigger Button -->
<button onclick="openPopup()">Open Iframe Popup</button>

<!-- The Popup Container (Hidden by default) -->
<div id="popupModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <iframe src="https://example.com" title="Popup Content"></iframe>
    </div>
</div>

<style>
    /* Background overlay */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
    }
    /* Centered popup box */
    .modal-content {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 90%; height: 85%; max-width: 1400px;
        min-width: 300px; min-height: 200px;
        background: white;
        padding: 20px;
        box-sizing: border-box;
        resize: both;
        overflow: auto;
    }
    /* Full size iframe */
    .modal-content iframe {
        width: 100%; height: 100%;
        border: none;
    }
    /* Close button */
    .close-btn {
        position: absolute;
        top: 10px; right: 15px;
        font-size: 24px; cursor: pointer;
    }
</style>

<script>
    function openPopup() {
        document.getElementById('popupModal').style.display = 'block';
    }
    function closePopup() {
        document.getElementById('popupModal').style.display = 'none';
    }
</script>
